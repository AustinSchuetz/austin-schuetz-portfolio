---
# cPanel Git Version Control deploy — CODE ONLY.
# content/, media/uploads/, storage/ are server-owned after launch and are
# deliberately absent from these tasks. First-launch seeding is manual
# (see LAUNCH.md step 4).
#
deployment:
  tasks:
    - export DOC=/home/austzncx/public_html
    - /bin/cp -f index.php .htaccess robots.txt favicon.ico $DOC/
    - /bin/rm -rf $DOC/app $DOC/templates $DOC/admin $DOC/assets.new
    - /bin/cp -R app templates admin $DOC/
    - /bin/cp -R assets $DOC/assets.new && /bin/rm -rf $DOC/assets && /bin/mv $DOC/assets.new $DOC/assets
    - /bin/mkdir -p $DOC/media/uploads $DOC/content $DOC/storage
    - /bin/cp -f media/.htaccess $DOC/media/.htaccess
